name: Weekly Digest

on:
  schedule:
    # Monday 03:30 UTC (9:00 AM IST)
    - cron: '30 3 * * 1'
  workflow_dispatch:

permissions:
  pull-requests: read
  issues: read

jobs:
  digest:
    name: Generate weekly digest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate and send digest
        uses: actions/github-script@v7
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          script: |
            const https = require('https');

            const now = new Date();
            const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
            const weekAgoISO = weekAgo.toISOString();

            // Get open PRs (paginated)
            let openPRs = [];
            let prPage = 1;
            while (true) {
              const { data: batch } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 100,
                page: prPage,
              });
              openPRs = openPRs.concat(batch);
              if (batch.length < 100) break;
              prPage++;
            }

            // Count categories
            const criticalPRs = openPRs.filter((pr) =>
              pr.labels.some((l) => l.name === 'critical')
            ).length;
            const readyPRs = openPRs.filter((pr) =>
              pr.labels.some((l) => l.name === 'ready-for-review')
            ).length;
            const needsChangesPRs = openPRs.filter((pr) =>
              pr.labels.some((l) => l.name === 'needs-changes')
            ).length;
            const stalePRs = openPRs.filter((pr) =>
              pr.labels.some((l) => l.name === 'stale')
            ).length;

            // New PRs this week
            const newPRs = openPRs.filter(
              (pr) => new Date(pr.created_at) > weekAgo
            ).length;

            // Get merged PRs this week
            const { data: closedPRs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              sort: 'updated',
              direction: 'desc',
              per_page: 100,
            });

            const mergedThisWeek = closedPRs.filter(
              (pr) => pr.merged_at && new Date(pr.merged_at) > weekAgo
            );

            // Top contributors (from merged PRs)
            const contributorCounts = {};
            for (const pr of mergedThisWeek) {
              const login = pr.user.login;
              contributorCounts[login] = (contributorCounts[login] || 0) + 1;
            }
            const topContributors = Object.entries(contributorCounts)
              .map(([login, count]) => ({ login, count }))
              .sort((a, b) => b.count - a.count)
              .slice(0, 5);

            // Get open issues
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            // Filter out PRs from issues list
            const actualIssues = openIssues.filter((i) => !i.pull_request);
            const newIssues = actualIssues.filter(
              (i) => new Date(i.created_at) > weekAgo
            ).length;

            // Build date string
            const dateStr = now.toLocaleDateString('en-GB', {
              weekday: 'long',
              day: 'numeric',
              month: 'long',
              year: 'numeric',
            });

            // Build Slack message
            const blocks = [
              {
                type: 'header',
                text: { type: 'plain_text', text: `:bar_chart: Weekly CSC Digest - ${dateStr}`, emoji: true },
              },
              {
                type: 'section',
                fields: [
                  { type: 'mrkdwn', text: `*Open PRs:* ${openPRs.length} (${newPRs} new)` },
                  { type: 'mrkdwn', text: `*Merged This Week:* ${mergedThisWeek.length}` },
                  { type: 'mrkdwn', text: `*Open Issues:* ${actualIssues.length} (${newIssues} new)` },
                  { type: 'mrkdwn', text: `*Critical PRs:* ${criticalPRs}` },
                ],
              },
              {
                type: 'section',
                fields: [
                  { type: 'mrkdwn', text: `*Ready for Review:* ${readyPRs}` },
                  { type: 'mrkdwn', text: `*Needs Changes:* ${needsChangesPRs}` },
                  { type: 'mrkdwn', text: `*Stale:* ${stalePRs}` },
                ],
              },
            ];

            if (topContributors.length > 0) {
              blocks.push({
                type: 'section',
                text: {
                  type: 'mrkdwn',
                  text:
                    '*Top Contributors This Week:*\n' +
                    topContributors
                      .map((c, i) => `${i + 1}. @${c.login} (${c.count} PR${c.count > 1 ? 's' : ''} merged)`)
                      .join('\n'),
                },
              });
            }

            if (mergedThisWeek.length > 0) {
              const mergedList = mergedThisWeek
                .slice(0, 5)
                .map((pr) => `- <${pr.html_url}|#${pr.number}> ${pr.title}`)
                .join('\n');
              blocks.push({
                type: 'section',
                text: {
                  type: 'mrkdwn',
                  text: `*Recently Merged:*\n${mergedList}${mergedThisWeek.length > 5 ? `\n_...and ${mergedThisWeek.length - 5} more_` : ''}`,
                },
              });
            }

            const payload = {
              attachments: [{ color: '#4A90D9', blocks }],
            };

            // Send to Slack
            const webhookUrl = process.env.SLACK_WEBHOOK_URL;
            if (!webhookUrl) {
              core.warning('SLACK_WEBHOOK_URL not set. Skipping digest notification.');
              core.info(JSON.stringify(payload, null, 2));
              return;
            }

            const url = new URL(webhookUrl);
            await new Promise((resolve, reject) => {
              const data = JSON.stringify(payload);
              const req = https.request(
                {
                  hostname: url.hostname,
                  path: url.pathname,
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'Content-Length': Buffer.byteLength(data),
                  },
                },
                (res) => {
                  if (res.statusCode === 200) {
                    core.info('Weekly digest sent to Slack.');
                    resolve();
                  } else {
                    core.warning(`Slack responded with ${res.statusCode}`);
                    resolve();
                  }
                }
              );
              req.on('error', (err) => {
                core.warning(`Slack error: ${err.message}`);
                resolve();
              });
              req.write(data);
              req.end();
            });
